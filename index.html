<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StudNow is a minimalist study forum for sharing, learning, and collaborating." />
  <title>StudNow</title>
  <script>
    window.BASE = window.location.hostname === 'aussenseiter-vsrb.github.io'
      ? '/CROWDIT2026_Pa-Yoga-Kami-Izin-Lomba-Lagi-Sebelum-PKL'
      : '';
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./dist/output.css" />
  <script>
    (function(){
      var t = localStorage.getItem('studnow_theme');
      if (!t || (t !== 'dark' && t !== 'light')) {
        t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <div id="navbar"></div>
  <div id="top-bar"></div>
  <main id="main"></main>
  <div id="bottom-bar"></div>
  <div id="footer"></div>

  <script type="module" src="./js/core/main.js"></script>
</body>
</html>
